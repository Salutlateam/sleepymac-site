<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Page introuvable — SleepyMac</title>
<meta name="robots" content="noindex"/>
<link rel="icon" type="image/png" href="/assets/icon.png"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;background:#000;color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px}
.wrap{max-width:440px}
.code{font-size:120px;font-weight:900;letter-spacing:-6px;line-height:1;background:linear-gradient(135deg,#2563eb,#93c5fd);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:16px}
h1{font-size:24px;font-weight:700;margin-bottom:12px}
p{font-size:15px;color:rgba(255,255,255,.5);line-height:1.6;margin-bottom:32px}
a{display:inline-flex;align-items:center;gap:8px;font-size:14px;font-weight:700;background:#fff;color:#000;padding:14px 28px;border-radius:99px;text-decoration:none;transition:opacity .2s}
a:hover{opacity:.85}
</style>
</head>
<body>
<div class="wrap">
  <div class="code">404</div>
  <h1>Page introuvable</h1>
  <p>La page que tu cherches n'existe pas ou a été déplacée.</p>
  <a href="/">← Retour à l'accueil</a>
</div>
</body>
</html>
